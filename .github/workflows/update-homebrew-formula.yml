name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.22). Optional on tag trigger.'
        required: false

permissions:
  contents: write

jobs:
  bump-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "version is required" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: ./scripts/update-homebrew-formula.sh "${{ steps.vars.outputs.version }}"

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/gimble.rb; then
            echo "No formula changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gimble.rb
          git commit -m "Bump Homebrew formula to v${{ steps.vars.outputs.version }}"
          git push origin HEAD:main
